name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  validate:
    name: validate (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 22.22.2
          - 24
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version: ${{ matrix.node-version }}
      - run: corepack enable
      - env:
          HUSKY: 0
        run: pnpm install --frozen-lockfile --prefer-offline
      - run: pnpm run lint
      - run: pnpm run test
      - run: pnpm --filter @kurone-kito/dantalion-web-demo-web run story:build

  e2e:
    name: e2e (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          run_install: false
      - uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version: 24
      - run: corepack enable
      - env:
          HUSKY: 0
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - run: pnpm --filter @kurone-kito/dantalion-web-demo-web exec playwright install --with-deps chromium
      - run: pnpm --filter @kurone-kito/dantalion-web-demo-web run test:e2e
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            packages/web/playwright-report
            packages/web/test-results
          retention-days: 7
