name: Actions on pushed feature branch
on:
  push:
    branches:
      - "*"
      - "!master"
jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: "17"
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v2
      - name: Use the Node.js version ${{ env.NODE_VERSION }} specified in the workflow
        uses: actions/setup-node@v2
        with:
          node-version: ${{ env.NODE_VERSION }}
